      <section>
        <h4>Ingredients</h4>
            <ul>
                <li>1/3 cup steel cut oats</li>
                <li>1 tbsp chia seeds</li>
                <li>1 tbsp peanut butter</li>
                <li>1 tsp of honey</li>
                <li>Dash cinnamon</li>
                <li>2/3 cup of almond milk</li>
            </ul>
            <p>
                Mix then refrigerate. In the morning slice a banana then mix and eat!                 
            </p>
      </section>
